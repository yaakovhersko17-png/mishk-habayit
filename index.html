<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <script>(function(){var q=window.location.search;if(q&&q.slice(1,3)==='p='){var p=q.slice(3).split('&q=');history.replaceState(null,null,window.location.pathname.split('/').slice(0,2).join('/')+'/'+p[0]+(p[1]?'?'+p[1]:''));}})();</script>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="HERSKO APP" />
    <meta name="theme-color" content="#6c63ff" />
    <title>HERSKO APP</title>
  </head>
  <body>
    <div id="root">
      <div style="background:#0f0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;direction:rtl">
        <div style="width:44px;height:44px;border-radius:50%;border:3px solid #6c63ff;border-top-color:transparent;animation:spin 0.8s linear infinite;margin-bottom:16px"></div>
        <p style="color:#94a3b8;margin:0;font-size:0.9rem">טוען...</p>
