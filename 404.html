<!DOCTYPE html>
<html>
<head>
<script>
  var l = window.location;
  l.replace(l.protocol+'//'+ l.hostname+(l.port?':'+l.port:'')+l.pathname.split('/').slice(0,2).join('/')+'/?p=/'+l.pathname.slice(1).split('/').slice(1).join('/')+(l.search?'&q='+l.search.slice(1):''));
</script>
</head>
<body></body>
</html>
